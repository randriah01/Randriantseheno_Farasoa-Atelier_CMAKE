name: Automatisation des tests

on: push

jobs:
  Compilation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Installer CMake
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Compilation et tests
        run: |
          mkdir build
          cd build
          cmake ..
          make
          ctest --output-on-failure
  
  Test_Add:
    runs-on: ubuntu-latest
    needs: Compilation
    steps:
      - uses: actions/checkout@v3
      - name: Test fonction add
        run: |
          mkdir build
          cd build
          cmake ..
          make
          ./src/calculator add 10 5

  Test_Carre:
    runs-on: ubuntu-latest
    needs: Compilation
    steps:
      - uses: actions/checkout@v3
      - name: Test fonction carré
        run: |
          mkdir build
          cd build
          cmake ..
          make
          ./src/calculator car 5
        
  Test_Carre:
  runs-on: ubuntu-latest
  needs: Compilation
  steps:
    - uses: actions/checkout@v3

    - name: Compilation
      run: |
        mkdir -p build
        cd build
        cmake ..
        make

    - name: Exécuter la fonction carré
      run: |
        mkdir -p output
        ./build/src/calculator car 5 > output/carre_result.txt

    - name: Publier l'artefact
      uses: actions/upload-artifact@v3
      with:
        name: carre-result
        path: output/carre_result.txt

